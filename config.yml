pupServer:
  url: http://localhost
  db:
    path: C:\vPinball\PinUPSystem\PUPDatabase.db
    filter: ifnull(GameTheme, 1) <> 'Adult'

httpServer:
  port: 8080
  logFormat: dev
  logLevel: error

options:
  defaultView: playlists  # home | playlists
  filters:
    category: true
    theme: true
    type: true
    decade: true
    emulator: true
    manufacturer: true
    favorites: true
  game:
    info: true
    help: true
    playfield: true
    highscore: true
    media:
      topper: false
      backglass: true
      dmd: true
      playfield: true
      help: true
      info: true
  dateFormat: dd.MM.yyyy HH.mm

  # Available fields: year, type, manufacturer, numPlayers, emulator,
  #   category, theme, rating, lastPlayed, numPlays, timePlayed,
  #   designedBy, webLinkUrl, gameVersion, gameDescription, romName, tableType
  gameFields:
    - year
    - type
    - manufacturer
    - numPlayers
    - emulator
    - lastPlayed
    - numPlays
    - timePlayed
    - designedBy
    - webLinkUrl
    - gameVersion
    - romName

media:
  useThumbs: true
  cacheInMinutes: 20
  playfieldRotation: true
  folders:
    topper: Topper
    backglass: BackGlass
    dmd: Menu
    playfield: Playfield
    help: GameHelp
    info: GameInfo
    highscore: Other2
